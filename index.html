<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpaceCraft Blueprint Index</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topbar">
    <div class="eyebrow-row">
      <p class="eyebrow">SpaceCraft // Blueprint Index</p>
      <div class="theme-picker" id="themePicker">
        <button class="theme-dot" data-theme="default" title="ToobsTube (default)"></button>
        <button class="theme-dot" data-theme="refinery" title="Refinery"></button>
        <button class="theme-dot" data-theme="cold" title="Cold Vacuum"></button>
      </div>
    </div>
    <h1>What do I need to build that?</h1>

    <div class="search-wrap">
      <span class="prompt-caret" aria-hidden="true">&gt;</span>
      <input id="search" type="text" placeholder="search items…" autocomplete="off" />
    </div>

    <nav class="tabs" id="tabs">
      <button class="tab active" data-cat="All">All</button>
      <button class="tab" data-cat="Extraction">Extraction</button>
      <button class="tab" data-cat="Gathering">Gathering</button>
      <button class="tab" data-cat="Base Building">Base Building</button>
      <button class="tab" data-cat="Refining">Refining</button>
      <button class="tab" data-cat="Components">Components</button>
      <button class="tab" data-cat="Crystal Geometry">Crystal Geometry</button>
      <button class="tab" data-cat="Contractor Equipment">Contractor Equipment</button>
      <button class="tab" data-cat="External Module">External Module</button>
      <button class="tab" data-cat="Ship Component">Ship Component</button>
      <button class="tab" data-cat="Factory Kit">Factory Kit</button>
      <button class="tab" data-cat="Other">Other</button>
      <button class="tab" data-cat="Internal Module">Internal Module</button>
      <button class="tab" data-cat="Ship Part">Ship Part</button>
    </nav>
  </header>

  <div class="layout">
    <main id="list" class="list"></main>
    <aside id="detail" class="detail-panel">
      <div class="detail-empty">Tap any item to see its full recipe and complete raw-materials breakdown here.</div>
    </aside>
  </div>

  <footer class="footer">
    <p>Hand-maintained from in-game play + community sources. EA build, May 20 2026 — recheck after patches.
      <span id="count"></span>
    </p>
  </footer>

<script src="app.js"></script>
</body>
</html>
